openapi: 3.0.3
info:
  title: ReportGenerate Local API
  description: ReportGenerate 本地接口文档。当前代码中只包含系统探活接口和 Actuator 健康检查接口。
  version: 0.0.1-SNAPSHOT
servers:
  - url: http://localhost:8080
    description: 本地开发环境
tags:
  - name: System
    description: 系统基础接口
  - name: Actuator
    description: Spring Boot Actuator 接口
paths:
  /api/system/ping:
    get:
      tags:
        - System
      summary: 系统探活
      description: 用于验证 ReportGenerate 后端服务是否正常启动。
      operationId: pingSystem
      responses:
        '200':
          description: 服务正常
          headers:
            X-Request-Id:
              description: 请求链路 ID
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PingApiResponse'
              example:
                code: 0
                message: success
                data:
                  status: ok
                  time: '2026-06-30T12:00:00+08:00'
                requestId: b6e6bda4d7fb4f14a3ed0b4e0ab7e7fd
  /actuator/health:
    get:
      tags:
        - Actuator
      summary: 应用健康检查
      description: Spring Boot Actuator 健康检查接口。
      operationId: getActuatorHealth
      responses:
        '200':
          description: 健康状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: UP
components:
  schemas:
    PingApiResponse:
      type: object
      required:
        - code
        - message
        - data
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            status:
              type: string
              example: ok
            time:
              type: string
              format: date-time
              example: '2026-06-30T12:00:00+08:00'
        requestId:
          type: string
          example: b6e6bda4d7fb4f14a3ed0b4e0ab7e7fd
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: UP
