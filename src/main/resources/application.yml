spring:
  application:
    name: report-generate
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/report_generate?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:report}
    password: ${DB_PASSWORD:report}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  file:
    max-size: ${FILE_MAX_SIZE:52428800}
    allowed-extensions:
      - docx
      - pdf
      - txt
      - md
      - doc
      - markdown
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:report-generate}
  external:
    agent-base-url: ${AGENT_BASE_URL:http://localhost:18080}
    knowledge-base-url: ${KNOWLEDGE_BASE_URL:http://localhost:18081}
